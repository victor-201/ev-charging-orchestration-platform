events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    keepalive_requests 1000;

    # DNS resolver for runtime upstream resolution (used by variable proxy_pass)
    resolver 8.8.8.8 1.1.1.1 valid=30s ipv6=off;

    # ── Rate Limiting Zones ──────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=users:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=staff:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=bookings:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=queue:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=stations:10m rate=200r/m;
    limit_req_zone $binary_remote_addr zone=billing:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=payments:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=wallet:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=analytics:10m rate=60r/m;

    # ── Logging Format ──────────────────────────────────────────────
    log_format upstream_metrics '$remote_addr - $remote_user [$time_local] '
        '"$request" $status $body_bytes_sent '
        '"$http_referer" "$http_user_agent" '
        'rt=$request_time uct="$upstream_connect_time" uht="$upstream_header_time" '
        'urt="$upstream_response_time" "$upstream_addr" "$upstream_status" '
        'req_id="$request_id"';

    access_log /var/log/nginx/access.log upstream_metrics;
    error_log /var/log/nginx/error.log warn;

    # ── Server ────────────────────────────────────────────────────────
    server {
        listen ${PORT} default_server;
        server_name _;

        # Upstream URLs — variables force runtime DNS resolution via resolver
        set $upstream_iam        "https://ev-iam-service.onrender.com";
        set $upstream_session    "https://ev-session-service.onrender.com";
        set $upstream_infra      "https://ev-infrastructure-service.onrender.com";
        set $upstream_billing    "https://ev-billing-service.onrender.com";
        set $upstream_notif      "https://ev-notification-service.onrender.com";
        set $upstream_analytics  "https://ev-analytics-service.onrender.com";
        set $upstream_telemetry  "https://ev-telemetry-ingestion.onrender.com";
        set $upstream_ocpp       "https://ev-ocpp-gateway.onrender.com";

        # ── Global Proxy Settings ─────────────────────────────────────
        # Timeouts
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # SSL / TLS
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_ssl_session_reuse on;

        # Remove upstream CORS/security headers — nginx enforces its own
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;
        proxy_hide_header Access-Control-Max-Age;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Strict-Transport-Security;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header X-Frame-Options;

        # Buffering
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Headers forwarded to upstream
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # ── Standardized JSON Error Pages ─────────────────────────────
        # Intercept nginx-generated 502/503/504 and return JSON
        error_page 502 503 504 @error_json;

        # ── Global CORS Headers (added to ALL responses) ──────────────
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Request-ID, X-Correlation-ID, Idempotency-Key, X-Kiosk-Key" always;
        add_header Access-Control-Expose-Headers "X-Correlation-ID, X-Request-ID, X-RateLimit-Remaining-Minute" always;
        add_header Access-Control-Max-Age 3600 always;

        # ── Security Headers ─────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;

        # ── Correlation ID ───────────────────────────────────────────
        add_header X-Correlation-ID $request_id always;

        # ── CORS Preflight ───────────────────────────────────────────
        if ($request_method = OPTIONS) {
            return 204;
        }

        # ── Health Check ─────────────────────────────────────────────
        location = /health {
            access_log off;
            return 200 "OK\n";
        }

        # ── JSON Error Page (nginx-generated errors only) ────────────
        location @error_json {
            internal;
            default_type application/json;
            return 502 '{"error":"Bad Gateway","message":"Service temporarily unavailable. The upstream service may be starting up. Please retry in a few seconds.","code":"GATEWAY_502","requestId":"$request_id"}';
        }

        # ── IAM Service Routes ───────────────────────────────────────
        location /api/v1/auth {
            limit_req zone=auth burst=5 nodelay;
            proxy_set_header Host ev-iam-service.onrender.com;
            proxy_pass $upstream_iam;
        }

        location /api/v1/users {
            limit_req zone=users burst=10 nodelay;
            proxy_set_header Host ev-iam-service.onrender.com;
            proxy_pass $upstream_iam;
        }

        location /api/v1/staff {
            limit_req zone=staff burst=10 nodelay;
            proxy_set_header Host ev-iam-service.onrender.com;
            proxy_pass $upstream_iam;
        }

        location /api/v1/attendance {
            limit_req zone=staff burst=10 nodelay;
            proxy_set_header Host ev-iam-service.onrender.com;
            proxy_pass $upstream_iam;
        }

        # ── Session Service Routes ───────────────────────────────────
        location /api/v1/bookings {
            limit_req zone=bookings burst=5 nodelay;
            proxy_set_header Host ev-session-service.onrender.com;
            proxy_pass $upstream_session;
        }

        location /api/v1/queue {
            limit_req zone=queue burst=10 nodelay;
            proxy_set_header Host ev-session-service.onrender.com;
            proxy_pass $upstream_session;
        }

        location /api/v1/charging {
            proxy_set_header Host ev-session-service.onrender.com;
            proxy_pass $upstream_session;
        }

        location /socket.io/charging {
            proxy_set_header Host ev-session-service.onrender.com;
            proxy_pass $upstream_session;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;
        }

        # ── Infrastructure Service ────────────────────────────────────
        location /api/v1/stations {
            limit_req zone=stations burst=20 nodelay;
            proxy_set_header Host ev-infrastructure-service.onrender.com;
            proxy_pass $upstream_infra;
        }

        # ── Billing Service Routes ───────────────────────────────────
        location /api/v1/billing {
            limit_req zone=billing burst=10 nodelay;
            proxy_set_header Host ev-billing-service.onrender.com;
            proxy_pass $upstream_billing;
        }

        location /api/v1/payments {
            limit_req zone=payments burst=5 nodelay;
            proxy_set_header Host ev-billing-service.onrender.com;
            proxy_pass $upstream_billing;
        }

        location /api/v1/wallet {
            limit_req zone=wallet burst=5 nodelay;
            proxy_set_header Host ev-billing-service.onrender.com;
            proxy_pass $upstream_billing;
        }

        location /api/v1/transactions {
            proxy_set_header Host ev-billing-service.onrender.com;
            proxy_pass $upstream_billing;
        }

        # ── Notification Service Routes ──────────────────────────────
        location /api/v1/notifications {
            proxy_set_header Host ev-notification-service.onrender.com;
            proxy_pass $upstream_notif;
        }

        location /api/v1/devices {
            proxy_set_header Host ev-notification-service.onrender.com;
            proxy_pass $upstream_notif;
        }

        location /api/v1/preferences {
            proxy_set_header Host ev-notification-service.onrender.com;
            proxy_pass $upstream_notif;
        }

        location /socket.io {
            proxy_set_header Host ev-notification-service.onrender.com;
            proxy_pass $upstream_notif;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;
        }

        # ── Analytics Service ────────────────────────────────────────
        location /api/v1/analytics {
            limit_req zone=analytics burst=10 nodelay;
            proxy_set_header Host ev-analytics-service.onrender.com;
            proxy_pass $upstream_analytics;
        }

        # ── Telemetry Service ────────────────────────────────────────
        location /api/v1/telemetry {
            proxy_set_header Host ev-telemetry-ingestion.onrender.com;
            proxy_pass $upstream_telemetry;
        }

        # ── OCPP Gateway Routes ──────────────────────────────────────
        location /api/v1/ocpp {
            proxy_set_header Host ev-ocpp-gateway.onrender.com;
            proxy_pass $upstream_ocpp;
        }

        location /ocpp {
            proxy_set_header Host ev-ocpp-gateway.onrender.com;
            proxy_pass $upstream_ocpp;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;
        }

        # ── Fallback ─────────────────────────────────────────────────
        location / {
            return 404;
        }
    }
}
