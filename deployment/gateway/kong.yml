_format_version: "3.0"

# ─────────────────────────────────────────────────────────────────────────────
# EV Charging Platform — Kong Gateway (Enterprise Hardened)
# Architecture: 8-service DDD microservices
# Security:     RS256 JWT offloaded at gateway, rate-limited per consumer
# ─────────────────────────────────────────────────────────────────────────────

plugins:
  # ── Global: Correlation ID ─────────────────────────────────────────────────
  - name: correlation-id
    enabled: true
    config:
      header_name: x-correlation-id
      generator: uuid
      echo_downstream: true

  # ── Global: Request Size Limit ────────────────────────────────────────────
  - name: request-size-limiting
    enabled: true
    config:
      allowed_payload_size: 8 # MB — default max for all routes

  # ── Global: CORS (production-hardened, no wildcard) ──────────────────────
  - name: cors
    enabled: true
    config:
      origins:
        - "http://localhost:5000"   # Web-admin (Next.js)
        - "http://localhost:5001"   # Kiosk (Vite)
        - "https://ev-platform.yourdomain.com"
        - "https://ev-admin.pages.dev"
        - "https://ev-kiosk.pages.dev"
      methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
      headers:
        - Authorization
        - Content-Type
        - Accept
        - X-Request-ID
        - X-Correlation-ID
        - Idempotency-Key
        - X-Kiosk-Key
      exposed_headers:
        - X-Correlation-ID
        - X-Request-ID
        - X-RateLimit-Remaining-Minute
      credentials: true
      max_age: 3600
      preflight_continue: false

  # ── Global: Security Headers ──────────────────────────────────────────────
  - name: response-transformer
    enabled: true
    config:
      add:
        headers:
          - "Strict-Transport-Security:max-age=63072000; includeSubDomains; preload"
          - "X-Content-Type-Options:nosniff"
          - "X-Frame-Options:DENY"

  # ── Global: Logging (JSON for ELK/Loki) ──────────────────────────────────
  - name: file-log
    enabled: true
    config:
      path: /dev/stdout
      reopen: true

  # ── Global: Connection Termination Policy ─────────────────────────────────
  - name: request-termination
    enabled: false
    config:
      status_code: 503
      message: "Service temporarily unavailable"

# ─────────────────────────────────────────────────────────────────────────────
# SERVICES (upstreams pointing to actual Render URLs)
# ─────────────────────────────────────────────────────────────────────────────
services:
  # Health check endpoint (returns 200 for Render health checks)
  - name: health-service
    url: http://httpbin.org/anything
    routes:
      - name: health-route
        paths:
          - /health
        strip_path: false
        methods:
          - GET

  # ─────────────────────────────────────────────────────────────────────────
  # IAM SERVICE (auth + user profile)
  # ─────────────────────────────────────────────────────────────────────────
  - name: iam-service
    url: http://ev-iam-service.onrender.com
    connect_timeout: 10000
    read_timeout: 30000
    write_timeout: 30000
    retries: 2
    routes:
      - name: auth-route
        paths: ["/api/v1/auth"]
        methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 10
              policy: local
              fault_tolerant: true
              error_code: 429
              error_message: "Too many auth requests. Try again in 1 minute."

      - name: users-route
        paths: ["/api/v1/users"]
        methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 60
              policy: local
              fault_tolerant: true

      - name: staff-route
        paths: ["/api/v1/staff"]
        methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 100
              policy: local
              fault_tolerant: true

      - name: attendance-route
        paths: ["/api/v1/attendance"]
        methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 100
              policy: local
              fault_tolerant: true

  # ─────────────────────────────────────────────────────────────────────────
  # SESSION SERVICE (booking + charging)
  # ─────────────────────────────────────────────────────────────────────────
  - name: session-service
    url: http://ev-session-service.onrender.com
    connect_timeout: 10000
    read_timeout: 60000
    write_timeout: 60000
    retries: 2
    routes:
      - name: bookings-route
        paths: ["/api/v1/bookings"]
        methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 30
              policy: local
              fault_tolerant: true

      - name: queue-route
        paths: ["/api/v1/queue"]
        methods: [GET, POST, DELETE, OPTIONS]
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 60
              policy: local
              fault_tolerant: true

      - name: charging-route
        paths: ["/api/v1/charging"]
        methods: [GET, POST, PUT, PATCH, OPTIONS]
        strip_path: false
        plugins: []

  # ── Session WebSocket Route ──────────────────────────────────────────────
  - name: session-ws-service
    url: http://ev-session-service.onrender.com
    connect_timeout: 10000
    read_timeout: 60000
    write_timeout: 60000
    retries: 2
    routes:
      - name: charging-ws-route
        paths: ["/socket.io/charging"]
        protocols: [http, https]
        strip_path: false
        preserve_host: true
        request_buffering: false
        response_buffering: false

  # ─────────────────────────────────────────────────────────────────────────
  # EV INFRASTRUCTURE SERVICE (stations, chargers, geo)
  # ─────────────────────────────────────────────────────────────────────────
  - name: ev-infrastructure-service
    url: http://ev-infrastructure-service.onrender.com
    connect_timeout: 30000
    read_timeout: 60000
    write_timeout: 60000
    retries: 5
    routes:
      - name: stations-route
        paths: ["/api/v1/stations"]
        methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 200
              policy: local
              fault_tolerant: true

  # ─────────────────────────────────────────────────────────────────────────
  # BILLING SERVICE (payments, wallet, transactions)
  # ─────────────────────────────────────────────────────────────────────────
  - name: billing-service
    url: http://ev-billing-service.onrender.com
    connect_timeout: 10000
    read_timeout: 60000
    write_timeout: 60000
    retries: 2
    routes:
      - name: billing-route
        paths: ["/api/v1/billing"]
        methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 60
              policy: local
              fault_tolerant: true

      - name: payments-route
        paths: ["/api/v1/payments"]
        methods: [GET, POST, PUT, PATCH, OPTIONS]
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 30
              policy: local
              fault_tolerant: true

      - name: wallet-route
        paths: ["/api/v1/wallet"]
        methods: [GET, POST, OPTIONS]
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 30
              policy: local
              fault_tolerant: true

      - name: transactions-route
        paths: ["/api/v1/transactions"]
        methods: [GET, OPTIONS]
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 60
              policy: local
              fault_tolerant: true

  # ─────────────────────────────────────────────────────────────────────────
  # NOTIFICATION SERVICE
  # ─────────────────────────────────────────────────────────────────────────
  - name: notification-service
    url: http://ev-notification-service.onrender.com
    connect_timeout: 30000
    read_timeout: 60000
    write_timeout: 60000
    retries: 5
    routes:
      - name: notifications-route
        paths: ["/api/v1/notifications"]
        strip_path: false
        plugins: []

      - name: devices-route
        paths: ["/api/v1/devices"]
        strip_path: false
        plugins: []

      - name: preferences-route
        paths: ["/api/v1/preferences"]
        strip_path: false
        plugins: []

      - name: notification-ws-route
        paths: ["/socket.io"]
        protocols: [http, https]
        strip_path: false
        preserve_host: true
        request_buffering: false
        response_buffering: false

  # ─────────────────────────────────────────────────────────────────────────
  # ANALYTICS SERVICE
  # ─────────────────────────────────────────────────────────────────────────
  - name: analytics-service
    url: http://ev-analytics-service.onrender.com
    connect_timeout: 10000
    read_timeout: 120000
    write_timeout: 60000
    retries: 2
    routes:
      - name: analytics-route
        paths: ["/api/v1/analytics"]
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 60
              policy: local
              fault_tolerant: true

  # ─────────────────────────────────────────────────────────────────────────
  # TELEMETRY INGESTION SERVICE (high-throughput IoT data)
  # ─────────────────────────────────────────────────────────────────────────
  - name: telemetry-ingestion-service
    url: http://ev-telemetry-ingestion.onrender.com
    connect_timeout: 5000
    read_timeout: 10000
    write_timeout: 10000
    retries: 1
    routes:
      - name: telemetry-route
        paths: ["/api/v1/telemetry"]
        strip_path: false

  # ─────────────────────────────────────────────────────────────────────────
  # OCPP GATEWAY SERVICE (OCPP 1.6J WebSocket Bridge)
  # ─────────────────────────────────────────────────────────────────────────
  - name: ocpp-gateway-service
    url: http://ev-ocpp-gateway.onrender.com
    connect_timeout: 10000
    read_timeout: 10000
    write_timeout: 10000
    retries: 1
    routes:
      - name: ocpp-health-route
        paths: ["/api/v1/ocpp"]
        strip_path: false

      - name: ocpp-ws-route
        paths: ["/ocpp"]
        protocols: [http, https]
        strip_path: false
        preserve_host: true
        request_buffering: false
        response_buffering: false
