services:
  - type: web
    name: ev-iam-service
    runtime: docker
    dockerfilePath: ./backend/iam-service/Dockerfile
    dockerContext: ./backend/iam-service
    plan: free
    envVars:
      - key: PORT
        value: "3001"
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: ev_platform_db
      - key: JWT_SECRET
        sync: false

